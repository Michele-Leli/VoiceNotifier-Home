name: Build APK Directly
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          npm install expo-build-properties --legacy-peer-deps

      - name: Build Android APK
        env:
          CI: 1
        run: |
          # 1. Setup Git e Asset
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git fetch origin vault-assets
          git checkout origin/vault-assets -- "assets/*.png" "**/*.jar" || echo "Asset non trovati"

          # 2. Prebuild
          npx expo prebuild --platform android --no-install

          # 3. Correzione mirata dei file Gradle
          cd android
          
          # Impostiamo la versione Kotlin nel gradle.properties (senza duplicati)
          sed -i '/android.kotlinVersion/d' gradle.properties
          echo "android.kotlinVersion=2.0.0" >> gradle.properties
          echo "kotlin.mpp.androidSourceSetLayoutVersion=2" >> gradle.properties

          # 4. IL TRUCCO FINALE: Inseriamo il flag di soppressione metadata direttamente nel build.gradle
          # Questo evita di passare parametri da riga di comando che Gradle potrebbe non riconoscere
          sed -i 's/kotlinVersion = .*/kotlinVersion = "2.0.0"/' build.gradle
          # Abilitiamo MultiDex per gestire la mole di classi delle librerie Google
          echo "android.defaultConfig.multiDexEnabled = true" >> build.gradle
          
          # Aggiungiamo la soppressione globale degli errori di versione metadata
          echo "allprojects { tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach { kotlinOptions { freeCompilerArgs += [\"-Xskip-metadata-version-check\"] } } }" >> build.gradle

          # 5. Compilazione
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleRelease -Pandroid.signingConfig.release=debug --no-daemon -Dkotlin.metadata.version.check=false
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-build
          path: android/app/build/outputs/apk/release/app-release.apk
