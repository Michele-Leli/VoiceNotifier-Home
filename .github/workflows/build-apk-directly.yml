name: Build APK Directly
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          # 1. Installazione standard
          npm install
          
          # 2. Forza l'allineamento delle versioni (TypeScript compreso)
          # Aggiungiamo || true per evitare che il workflow si fermi se Expo fa i capricci
          npx expo install --check --fix || true
          
          # 3. Installazione manuale della versione specifica di TypeScript richiesta
          npm install typescript@~5.3.3 --save-dev

      - name: Build Android APK
        run: |
          # 1. Pulisce tutto
          rm -rf android
          
          # 2. Esporta il bundle JS (fondamentale per non avere l'errore rosso)
          npx expo export --platform android
          
          # 3. Prebuild
          npx expo prebuild --platform android --no-install
          
          # 4. Compila in modalità RELEASE (mette il codice dentro l'APK)
          chmod +x android/gradlew
          cd android
          # Usiamo assembleRelease per impacchettare tutto il codice offline
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-final-funzionante
          # Nota: il percorso cambia in 'release'
          path: android/app/build/outputs/apk/release/app-release.apk
