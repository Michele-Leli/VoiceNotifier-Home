name: Build APK Directly
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          # Installiamo comunque la runtime anche se la cancelleremo, per evitare ogni errore
          npm install @expo/metro-runtime

      - name: Fix Expo Config (Remove Web)
        run: |
          # Questo comando cerca "web" dentro app.json e lo elimina
          sed -i 's/"web",//g' app.json || true
          sed -i 's/,"web"//g' app.json || true
          sed -i 's/"web"//g' app.json || true
          # Rimuove anche eventuali virgole doppie rimaste dopo la cancellazione
          sed -i 's/\[,/\[/g' app.json || true
          sed -i 's/,,/,/g' app.json || true
          echo "Configurazione app.json pulita:"
          cat app.json

      - name: Build Android APK
        run: |
          # Esporta solo per Android
          npx expo export --platform android
          
          # Genera la cartella nativa
          npx expo prebuild --platform android --no-install
          
          # Permessi e compilazione
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          # Percorso corretto per la versione debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
