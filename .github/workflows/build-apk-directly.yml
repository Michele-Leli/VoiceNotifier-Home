name: Build APK Directly
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Recuperiamo gli asset prima di tutto
      - name: Force Restore Assets from Vault
        run: |
          git fetch origin vault-assets
          git checkout origin/vault-assets -- "**/*.png" "**/*.jar" || echo "Asset non trovati, procedo comunque"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          npm install --save-dev typescript@~5.3.3 --legacy-peer-deps

      - name: Build Android APK
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4096m -XX:MaxMetaspaceSize=1024m"
          NODE_OPTIONS: "--max-old-space-size=4096"
          CI: 1  # Questo sostituisce --non-interactive come suggerito dal tuo log
        run: |
          # 1. Rigenerazione (Expo 51)
          npx expo prebuild --platform android --no-install

          # 2. Ripristino icone e jar (fondamentale farlo DOPO il prebuild)
          git checkout origin/vault-assets -- "**/*.png" "**/*.jar" || echo "Asset non trovati"

          # 3. Entriamo nella cartella android per i comandi successivi
          cd android

          # 4. Forziamo la versione di Kotlin a 2.0.0 nel file build.gradle corretto
          # Usiamo 'find' per essere sicuri di beccare il file giusto
          sed -i 's/kotlinVersion = .*/kotlinVersion = "2.0.0"/' build.gradle
          sed -i 's/kotlin_version = .*/kotlin_version = "2.0.0"/' build.gradle

          # 5. Permessi e Compilazione
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleRelease -Pandroid.signingConfig.release=debug --no-daemon --stacktrace
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-build
          path: android/app/build/outputs/apk/release/app-release.apk
