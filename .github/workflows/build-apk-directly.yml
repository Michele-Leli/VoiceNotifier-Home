name: Build APK Directly
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Recuperiamo gli asset prima di tutto
      - name: Force Restore Assets from Vault
        run: |
          git fetch origin vault-assets
          git checkout origin/vault-assets -- "**/*.png" "**/*.jar" || echo "Asset non trovati, procedo comunque"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          npm install expo-build-properties --legacy-peer-deps

      - name: Build Android APK
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4096m -XX:MaxMetaspaceSize=1024m"
          NODE_OPTIONS: "--max-old-space-size=4096"
          CI: 1
        run: |
          # 1. Installiamo le proprietà di build
          npm install expo-build-properties --legacy-peer-deps

          # 2. Rigenerazione (Prebuild)
          npx expo prebuild --platform android --no-install

          # 3. Ripristino Asset
          git checkout origin/vault-assets -- "**/*.png" "**/*.jar" || echo "Asset non trovati"

          # 4. TRUCCO FINALE: Forziamo la versione nel file gradle.properties
          # Questo sovrascrive qualsiasi altra impostazione di Expo o delle librerie
          echo "android.kotlinVersion=2.0.0" >> android/gradle.properties
          echo "kotlinVersion=2.0.0" >> android/gradle.properties

          # 5. Compilazione
          cd android
          chmod +x gradlew
          ./gradlew clean
          # Forziamo il parametro anche qui per disperazione
          ./gradlew assembleRelease -Pandroid.signingConfig.release=debug -PkotlinVersion=2.0.0 -Pandroid.kotlinVersion=2.0.0 --no-daemon --stacktrace
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-build
          path: android/app/build/outputs/apk/release/app-release.apk
