name: Build APK Directly
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          # npx expo install sceglie le versioni corrette compatibili con la tua versione di Expo
          npx expo install expo-av expo-speech expo-notifications @react-native-async-storage/async-storage -- --legacy-peer-deps
          npm install expo-build-properties --legacy-peer-deps

      - name: Build Android APK
        env:
          CI: 1
        run: |
          # 1. Setup Git e Asset
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git fetch origin vault-assets
          git checkout origin/vault-assets -- "assets/*.png" "**/*.jar" || echo "Asset non trovati"

          # 2. Prebuild
          npx expo prebuild --platform android --no-install

          # 3. Entriamo nella cartella android
          cd android
          
          # 4. FORZATURA KOTLIN (Risolve il tuo errore nello screenshot)
          sed -i 's/kotlinVersion = .*/kotlinVersion = "2.0.0"/' build.gradle
          echo "android.kotlinVersion=2.0.0" >> gradle.properties
          
          # Salta il controllo dei metadati che bloccava tutto
          echo "subprojects { tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach { kotlinOptions { freeCompilerArgs += ['-Xskip-metadata-version-check'] } } }" >> build.gradle

          # Forza l'esclusione di versioni GMS che richiedono login obbligatorio
          echo "rootProject.ext { excludeAppInvite = true; excludeAds = true }" >> build.gradle

      - name: Generate Keystore
        run: |
          cd android
          # Elimina vecchi file per evitare errori di formato
          rm -f app/debug.keystore
          # Genera il keystore dentro la cartella app
          keytool -genkey -v \
            -keystore app/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storetype PKCS12 \
            -dname "CN=Android Debug,O=Android,C=US" \
            -noprompt

      - name: Build Android Release
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          # Passiamo i parametri di firma per garantire che l'APK sia sempre identico
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=debug.keystore \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=androiddebugkey \
            -Pandroid.injected.signing.key.password=android \
            --no-daemon
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-build
          path: android/app/build/outputs/apk/release/app-release.apk
