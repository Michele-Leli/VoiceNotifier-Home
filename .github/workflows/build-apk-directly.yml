name: Build APK Directly
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Recuperiamo gli asset prima di tutto
      - name: Force Restore Assets from Vault
        run: |
          git fetch origin vault-assets
          git checkout origin/vault-assets -- "**/*.png" "**/*.jar" || echo "Asset non trovati, procedo comunque"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          npm install --save-dev typescript@~5.3.3 --legacy-peer-deps

      - name: Build Android APK
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4096m -XX:MaxMetaspaceSize=1024m"
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          # 1. RIGENERAZIONE (Senza cancellare tutto se possibile)
          # Se 'android' esiste già, prebuild lo aggiorna. Se lo cancelli, perdi i .jar ripristinati.
          npx expo prebuild --platform android --non-interactive --no-install

          # 2. RIPRISTINO POST-PREBUILD (Essenziale!)
          # Expo prebuild potrebbe aver sovrascritto i file appena ripristinati. 
          # Li forziamo di nuovo dentro la cartella generata.
          git checkout origin/vault-assets -- "**/*.png" "**/*.jar" || echo "Riapplicazione asset fallita"

          # 3. Forziamo la versione di Kotlin a 2.0.0 per risolvere l'incompatibilità dei metadati
          # Cerchiamo build.gradle nella cartella android o android/build.gradle
          sed -i 's/kotlinVersion = .*/kotlinVersion = "2.0.0"/' build.gradle || echo "Non trovato in root"
          sed -i 's/kotlin_version = .*/kotlin_version = "2.0.0"/' build.gradle || echo "Non trovato in root"
          
          # 4. Compilazione con Gradle
          ./gradlew clean
          ./gradlew assembleRelease -Pandroid.signingConfig.release=debug -PkotlinVersion=2.0.0 --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-build
          path: android/app/build/outputs/apk/release/app-release.apk
