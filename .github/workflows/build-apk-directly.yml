name: Build APK Directly
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

- name: Install dependencies
        run: |
          npm install
          # Installiamo comunque questa per sicurezza, evita blocchi improvvisi
          npm install @expo/metro-runtime

      - name: Build Android APK
        run: |
          # 1. Rimuove forzatamente "web" dalle piattaforme in app.json se presente
          sed -i 's/"web",//g' app.json || true
          sed -i 's/,"web"//g' app.json || true
          
          # 2. Esporta solo per Android
          npx expo export --platform android
          
          # 3. Genera i file nativi
          npx expo prebuild --platform android --no-install
          
          # 4. Rendi eseguibile Gradle e compila
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          # Assicurati che il percorso sia /debug/ e non /release/
          path: android/app/build/outputs/apk/debug/app-debug.apk
