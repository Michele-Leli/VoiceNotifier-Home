name: Build APK Directly
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          npm install expo-build-properties --legacy-peer-deps

      - name: Build Android APK
        env:
          CI: 1
        run: |
          # 1. Configurazione Git
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          
          # 2. RECUPERO ASSET (PNG e JAR) - FONDAMENTALE PRIMA DEL PREBUILD
          git fetch origin vault-assets
          # Checkout esplicito: prendiamo tutto quello che c'è in assets e i jar necessari
          git checkout origin/vault-assets -- "assets/*.png" "**/*.jar" || echo "Attenzione: Alcuni asset non trovati"

          # 3. Rigenerazione (Prebuild)
          # Ora che le immagini ci sono, Expo non andrà in crash
          npx expo prebuild --platform android --no-install

          # 4. Compilazione
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleRelease -Pandroid.signingConfig.release=debug --no-daemon
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-build
          path: android/app/build/outputs/apk/release/app-release.apk
