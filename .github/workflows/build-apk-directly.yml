name: Build APK Directly
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Recuperiamo gli asset prima di tutto
      - name: Force Restore Assets from Vault
        run: |
          git fetch origin vault-assets
          git checkout origin/vault-assets -- "**/*.png" "**/*.jar" || echo "Asset non trovati, procedo comunque"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          npm install expo-build-properties --legacy-peer-deps

      - name: Build Android APK
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4096m -XX:MaxMetaspaceSize=1024m"
          NODE_OPTIONS: "--max-old-space-size=4096"
          CI: 1
        run: |
          # 1. Rigenerazione cartella nativa
          npx expo prebuild --platform android --no-install

          # 2. Ripristino icone e jar dal Vault
          git checkout origin/vault-assets -- "**/*.png" "**/*.jar" || echo "Asset non trovati"

          # 3. FIX VERSIONI KOTLIN (Entriamo nella cartella android)
          cd android
          
          # Cerchiamo di sovrascrivere la variabile kotlinVersion ovunque sia definita
          sed -i 's/kotlinVersion = .*/kotlinVersion = "2.0.0"/' build.gradle
          sed -i 's/kotlin_version = .*/kotlin_version = "2.0.0"/' build.gradle
          
          # 4. Permessi e Compilazione
          chmod +x gradlew
          ./gradlew clean
          # Passiamo la versione anche come parametro diretto per sicurezza
          ./gradlew assembleRelease -Pandroid.signingConfig.release=debug -PkotlinVersion=2.0.0 --no-daemon --stacktrace
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-build
          path: android/app/build/outputs/apk/release/app-release.apk
