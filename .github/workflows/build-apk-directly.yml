name: Build APK Directly
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Force Restore Assets for Build
        run: |
          git fetch origin vault-assets
          git checkout origin/vault-assets -- "**/*.png" "**/*.jar" || echo "Asset non trovati, procedo comunque"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          # Assicuriamoci che la versione di TypeScript sia quella corretta per Expo 51
          npm install --save-dev typescript@~5.3.3

      - name: Build Android APK
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4096m -XX:MaxMetaspaceSize=1024m"
        run: |
          # 1. Pulisce la cartella android se esiste (partiamo da zero)
          rm -rf android
          
          # 2. Prebuild: genera la cartella nativa android
          npx expo prebuild --platform android --no-install
          
          # 3. Forza la generazione del bundle offline (evita l'errore rosso all'avvio)
          mkdir -p android/app/src/main/assets
          npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res
          
          # 4. Compila in modalità RELEASE
          chmod +x android/gradlew
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-final-funzionante
          # Nota: il percorso cambia in 'release'
          path: android/app/build/outputs/apk/release/app-release.apk
