name: Build APK Directly
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          npm install expo-build-properties --legacy-peer-deps

      - name: Build Android APK
        env:
          CI: 1
        run: |
          # 1. Setup Git e Asset
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git fetch origin vault-assets
          git checkout origin/vault-assets -- "assets/*.png" "**/*.jar" || echo "Asset non trovati"

          # 2. Prebuild
          npx expo prebuild --platform android --no-install

          # 3. CORREZIONE CHIRURGICA
          cd android
          
          # Cambiamo la versione Kotlin nel file ROOT (build.gradle)
          sed -i 's/kotlinVersion = .*/kotlinVersion = "2.0.0"/' build.gradle
          
          # Cambiamo la versione Kotlin nelle PROPRIETÀ
          sed -i 's/android.kotlinVersion=.*/android.kotlinVersion=2.0.0/' gradle.properties
          # Se la riga non esiste, la aggiungiamo in modo pulito
          grep -q "android.kotlinVersion" gradle.properties || echo "android.kotlinVersion=2.0.0" >> gradle.properties

          # 4. IL TRUCCO PER I METADATI (Sintassi corretta per la root)
          # Invece di aggiungere blocchi 'android', usiamo questo che è universale:
          echo "subprojects { tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach { kotlinOptions { freeCompilerArgs += ['-Xskip-metadata-version-check'] } } }" >> build.gradle

          # 5. PULIZIA KEYSTORE (Risolve il problema DerInputStream)
          # Eliminiamo il keystore potenzialmente corrotto
          rm -f app/debug.keystore
          
          # 6. Compilazione
          chmod +x gradlew
          ./gradlew clean
          # Aggiungiamo un parametro che forza la generazione di un nuovo keystore se manca
          ./gradlew assembleRelease -Pandroid.signingConfig.release=debug --no-daemon
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-build
          path: android/app/build/outputs/apk/release/app-release.apk
