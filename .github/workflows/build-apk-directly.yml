name: Build APK Directly
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          npm install expo-build-properties --legacy-peer-deps

      - name: Build Android APK
        env:
          CI: 1
        run: |
          # 1. Setup Git e Asset
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          
          # Gestione fetch sicura
          git fetch origin vault-assets || echo "Branch vault-assets non trovato, salto il fetch"
          git checkout origin/vault-assets -- "assets/*.png" "**/*.jar" 2>/dev/null || echo "Asset non trovati o branch non esistente"

          # 2. Prebuild
          # Usiamo --no-install per velocizzare, dato che abbiamo già fatto npm install
          npx expo prebuild --platform android --no-install || echo "Prebuild ha riscontrato avvisi (proseguo comunque)"

          # 3. CORREZIONE CHIRURGICA
          cd android
          
          # Cambiamo la versione Kotlin nel file ROOT (build.gradle)
          # Proviamo diversi pattern per sed
          sed -i 's/kotlinVersion = .*/kotlinVersion = "2.0.0"/' build.gradle || true
          
          # Cambiamo la versione Kotlin nelle PROPRIETÀ
          if [ -f gradle.properties ]; then
            sed -i 's/android.kotlinVersion=.*/android.kotlinVersion=2.0.0/' gradle.properties || true
            grep -q "android.kotlinVersion" gradle.properties || echo "android.kotlinVersion=2.0.0" >> gradle.properties
          fi

          # 4. IL TRUCCO PER I METADATI (Sintassi corretta per la root)
          # Rimuoviamo eventuali duplicati prima di aggiungere
          grep -v "Xskip-metadata-version-check" build.gradle > build.gradle.tmp && mv build.gradle.tmp build.gradle
          echo "subprojects { tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach { kotlinOptions { freeCompilerArgs += ['-Xskip-metadata-version-check'] } } }" >> build.gradle
          
          # 5. GESTIONE KEYSTORE PERSISTENTE
          if [ -f app/debug.keystore ]; then
            echo "Uso il keystore esistente per mantenere la stessa firma."
          else
            echo "Generazione nuovo keystore"
            keytool -genkey -v -keystore app/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

          # 7. Compilazione
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleRelease -Pandroid.signingConfig.release=debug --no-daemon
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-build
          path: android/app/build/outputs/apk/release/app-release.apk