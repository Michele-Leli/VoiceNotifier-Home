name: Build APK Directly
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          # Questi due risolvono i problemi di Gradle che vedi nei log
          npm install expo-modules-autolinking @expo/config-plugins
          
      - name: Build Android APK
        run: |
          # 1. Pulizia profonda per evitare conflitti di cache
          npx expo prebuild --platform android --clean
          
          # 2. Rendi eseguibile e compila
          chmod +x android/gradlew
          cd android
          
          # Usiamo --no-daemon per evitare blocchi di memoria su GitHub Actions
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
