name: Build APK Directly
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          npm install expo-build-properties --legacy-peer-deps

      - name: Build Android APK
        env:
          CI: 1
        run: |
          # 1. Setup Git e Asset (come prima)
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git fetch origin vault-assets
          git checkout origin/vault-assets -- "assets/*.png" "**/*.jar" || echo "Asset non trovati"

          # 2. Prebuild
          npx expo prebuild --platform android --no-install

          # 3. FORZATURA ESTREMA dei flag di compilazione
          cd android
          
          # Creiamo/Modifichiamo un file gradle.properties per forzare i flag globali
          echo "kotlin.code.style=official" >> gradle.properties
          # Questo flag è quello che risolve il tuo errore specifico:
          echo "kotlin.incremental=false" >> gradle.properties
          
          # Sovrascriviamo la versione di Kotlin in ogni modo possibile
          sed -i 's/kotlinVersion = .*/kotlinVersion = "2.0.0"/' build.gradle
          sed -i 's/android.kotlinVersion=.*/android.kotlinVersion=2.0.0/' gradle.properties

          # 4. Compilazione con flag di soppressione errori metadata
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleRelease \
            -Pandroid.signingConfig.release=debug \
            -PkotlinVersion=2.0.0 \
            -Pkotlin.compiler.execution.strategy="out-process" \
            -Dkotlin.metadata.version.check=false \
            --no-daemon
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-build
          path: android/app/build/outputs/apk/release/app-release.apk
