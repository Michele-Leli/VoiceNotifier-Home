name: Build APK Directly
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          npm install expo-build-properties --legacy-peer-deps

      - name: Build Android APK
        env:
          CI: 1
        run: |
          # 1. Setup Git e Asset
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          
          # Gestione fetch sicura
          git fetch origin vault-assets || echo "Branch vault-assets non trovato, salto il fetch"
          git checkout origin/vault-assets -- "assets/*.png" "**/*.jar" 2>/dev/null || echo "Asset non trovati o branch non esistente"

          # 2. Prebuild (Pulizia completa per evitare conflitti con folder android esistente)
          # Salviamo il keystore per sicurezza prima di piallare
          cp android/app/debug.keystore ./temp_debug.keystore || echo "Keystore non trovato in android/app"
          
          # Rigeneriamo da zero il folder android basandoci su app.json aggiornato
          rm -rf android
          npx expo prebuild --platform android --no-install --no-interactive
          
          # Ripristiniamo il keystore originale
          mkdir -p android/app
          cp ./temp_debug.keystore android/app/debug.keystore || echo "Impossibile ripristinare keystore"

          # 3. CORREZIONE CHIRURGICA E PATCH
          cd android
          
          # Forziamo Kotlin 2.0.21 ovunque (allineato con il plugin expo custom)
          sed -i 's/kotlinVersion = .*/kotlinVersion = "2.0.21"/' build.gradle || true
          if [ -f gradle.properties ]; then
            sed -i 's/android.kotlinVersion=.*/android.kotlinVersion=2.0.21/' gradle.properties || true
            echo "android.kotlinVersion=2.0.21" >> gradle.properties
          fi

          # Patch per i metadati Kotlin (necessario per molti pacchetti React Native con Kotlin 2.0)
          echo "subprojects { tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach { kotlinOptions { freeCompilerArgs += ['-Xskip-metadata-version-check'] } } }" >> build.gradle
          
          # 5. VERIFICA KEYSTORE
          if [ ! -f app/debug.keystore ]; then
            echo "Generazione nuovo keystore di emergenza"
            keytool -genkey -v -keystore app/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          else
            echo "Keystore presente e pronto."
          fi

          # 7. Compilazione
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleRelease -Pandroid.signingConfig.release=debug --no-daemon
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-build
          path: android/app/build/outputs/apk/release/app-release.apk