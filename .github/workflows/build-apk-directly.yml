name: Build APK Directly
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Force Restore Assets for Build
        run: |
          git fetch origin vault-assets
          git checkout origin/vault-assets -- "**/*.png" "**/*.jar" || echo "Asset non trovati, procedo comunque"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          # Forza TypeScript corretto per Expo 51
          npm install --save-dev typescript@~5.3.3 --legacy-peer-deps

      - name: Build Android APK
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4096m -XX:MaxMetaspaceSize=1024m"
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          # 1. Pulizia e rigenerazione file nativi (Expo 51)
          rm -rf android
          npx expo prebuild --platform android --non-interactive --no-install
          
          # 2. Permessi di esecuzione
          chmod +x android/gradlew
          
          # 3. Compilazione con Gradle
          cd android
          # Pulisce la cache locale di gradle nel progetto e compila
          ./gradlew clean
          # Usiamo assembleRelease per generare l'APK
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-final-funzionante
          # Nota: il percorso cambia in 'release'
          path: android/app/build/outputs/apk/release/app-release.apk
