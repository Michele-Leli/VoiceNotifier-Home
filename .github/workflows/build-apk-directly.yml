name: Build APK Directly
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          npm install @expo/metro-runtime

      - name: Overwrite app.json (Force Android only)
        run: |
          # Questo comando sovrascrive il tuo app.json con uno minimale
          # Sostituisci "IlTuoProgetto" con il nome reale della tua app se vuoi
          echo '{
            "expo": {
              "name": "App-Build",
              "slug": "app-build",
              "version": "1.0.0",
              "platforms": ["android"],
              "android": {
                "package": "com.manual.build"
              }
            }
          }' > app.json
          echo "Nuovo app.json creato:"
          cat app.json

      - name: Build Android APK
        run: |
          # Ora expo export non troverà traccia di "web"
          npx expo export --platform android
          npx expo prebuild --platform android --no-install
          chmod +x android/gradlew
          cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
