name: Build APK Directly
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Force Restore Assets for Build
        run: |
          git fetch origin vault-assets
          git checkout origin/vault-assets -- "**/*.png" "**/*.jar" || echo "Asset non trovati, procedo comunque"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          # Forza TypeScript corretto per Expo 51
          npm install --save-dev typescript@~5.3.3 --legacy-peer-deps

      - name: Build Android APK
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4096m -XX:MaxMetaspaceSize=1024m"
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          # 1. Pulisce tutto
          rm -rf android
          
          # 2. Genera i file nativi (Expo 51)
          # Non usiamo --template per evitare errori di template mancante, Expo userà quello di default
          npx expo prebuild --platform android --non-interactive --no-install
          
          # 3. Assicuriamoci che gradlew sia eseguibile
          chmod +x android/gradlew
          
          # 4. Bundle offline (facoltativo se gradle lo fa, ma utile per certezza)
          mkdir -p android/app/src/main/assets
          npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res --reset-cache || echo "Bundle failed, relying on gradle"
          
          # 5. Compilazione
          cd android
          ./gradlew clean
          ./gradlew assembleRelease --no-daemon --stacktrace --info

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-final-funzionante
          # Nota: il percorso cambia in 'release'
          path: android/app/build/outputs/apk/release/app-release.apk
