name: Restore Protected Assets
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Recovery of All Binaries
        run: |
          git config --global user.name "Asset Protector"
          git config --global user.email "actions@github.com"
          
          # 1. Recupera la lista di tutti i file .png e .jar dal branch di backup
          # 2. Li estrae forzatamente nel main
          git checkout vault-assets -- "**/*.png" "**/*.jar" || echo "Alcuni file non trovati"
          
          # Controlla se Git ha effettivamente ripristinato qualcosa
          if [ -n "$(git status --porcelain)" ]; then
            echo "Ripristino file binari in corso..."
            git add .
            git commit -m "fix: ripristino automatico icone e jar da vault-assets"
            git push origin main
          else
            echo "Tutti i file binari sono già integri. Nessuna azione necessaria."
          fi
