name: Fix Git Index
on: workflow_dispatch

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Scarica tutta la cronologia per sicurezza

      - name: Restore and Lock Files
        run: |
          # 1. Forza l'aggiunta dei file anche se sono nel .gitignore
          git add -f assets/*.png
          git add -f plugins/*.jar || true 
          
          # 2. Applica il blocco "skip-worktree"
          # Usiamo -f anche qui per sicurezza
          git ls-files -z assets/*.png | xargs -0 git update-index --skip-worktree
          
          # 3. Configura l'utente
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # 4. Salva e Pusha
          git commit -m "fix: forzato ripristino asset e blocco skip-worktree" || echo "Nessuna modifica necessaria"
          git push
