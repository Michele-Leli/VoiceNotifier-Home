name: Convert AAB to APK
on:
  workflow_dispatch: # Permette di avviarlo manualmente con un tasto

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Bundletool
        run: |
          wget https://github.com/google/bundletool/releases/download/1.17.0/bundletool-all-1.17.0.jar -O bundletool.jar


      - name: Download AAB from Google Drive
        run: |
          FILE_ID="1GbHM2Lc_--6so8QxzR5U0OiV-WF6Akeu"
          # 1. Ottieni il codice di conferma per i file grandi
          CONFIRM=$(curl -sc /tmp/cookies.txt "https://docs.google.com/uc?export=download&id=${FILE_ID}" | sed -rn 's/.*confirm=([0-9A-Za-z_]+).*/\1/p')
          
          # 2. Scarica il file reale usando il cookie e il token di conferma
          curl -Lb /tmp/cookies.txt "https://docs.google.com/uc?export=download&id=${FILE_ID}&confirm=${CONFIRM}" -o app-release.aab
          
          # Verifica la dimensione (giusto per essere sicuri nel log)
          ls -lh app-release.aab

      - name: Convert AAB to Universal APK
        run: |
          java -jar bundletool.jar build-apks \
            --bundle=app-release.aab \
            --output=app.apks \
            --mode=universal

      - name: Extract APK
        run: |
          unzip app.apks -d extracted_apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: universal-apk
          path: extracted_apk/universal.apk
          
      - name: Download AAB from Expo
        run: |
          # Incolla il link tra le virgolette
          wget "https://expo.dev/artifacts/eas/hY1iEd3VcsB2PNFZiDaTSh.aab" -O app-release.aab

      - name: Convert AAB to Universal APK
        run: |
          java -jar bundletool.jar build-apks \
            --bundle=app-release.aab \
            --output=app.apks \
            --mode=universal

      - name: Extract APK
        run: |
          unzip app.apks -d extracted_apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: universal-apk
          path: extracted_apk/universal.apk
