scripts:
  - name: Install dependencies and Build Web
    script: |
      npm install
      npm run build
  - name: Setup Capacitor and Android
    script: |
      # Installa i pacchetti necessari
      npm install @capacitor/core @capacitor/cli @capacitor/android
      
      # Inizializza Capacitor se manca il file di config
      if [ ! -f "capacitor.config.ts" ]; then
        npx cap init "VoiceNotifier" "com.michele.voicenotifier" --web-dir dist
      fi
      
      # Aggiunge la cartella Android e copia i file
      npx cap add android
      npx cap copy android
  - name: Build Android APK
    script: |
      cd android
      ./gradlew assembleRelease
